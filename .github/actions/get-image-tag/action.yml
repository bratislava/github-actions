name: Get image tag
description: Resolve the Docker image tag for a commit, optionally prefixed by cluster

inputs:
  image:
    description: Full image name including registry/repository
    required: true
  cluster:
    description: >-
      Target cluster: development, staging, production, or aws. Leave empty for
      an unprefixed commit tag.
    required: false
    default: ""

outputs:
  tag:
    description: Resolved image tag (image:<short-sha> or image:<cluster>-<short-sha>)
    value: ${{ steps.tag.outputs.tag }}

runs:
  using: composite
  steps:
    - name: Resolve image tag
      id: tag
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        CLUSTER: ${{ inputs.cluster }}
        SHA: ${{ github.sha }}
      run: |
        SHORT_SHA="${SHA:0:7}"
        if [ -z "$CLUSTER" ]; then
          echo "tag=${IMAGE}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
        else
          case "$CLUSTER" in
            development|staging|production|aws) ;;
            *)
              echo "::error::Invalid cluster '$CLUSTER'. Allowed: development, staging, production, aws (or empty)."
              exit 1
              ;;
          esac
          echo "tag=${IMAGE}:${CLUSTER}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
        fi
