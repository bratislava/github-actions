name: Setup Docker build
description: Set up Docker Buildx, log in to registries, and emit metadata-action tag rules

inputs:
  docker_registry_username:
    description: Docker Hub username
    required: true
  docker_registry_password:
    description: Docker Hub password
    required: true
  harbor_registry:
    description: Harbor registry hostname
    required: true
  harbor_registry_username:
    description: Harbor registry username
    required: true
  harbor_registry_password:
    description: Harbor registry password
    required: true
  buildx_driver_opts:
    description: Optional newline-delimited Docker Buildx driver options
    required: false
    default: ""

outputs:
  metadata_tags:
    description: >-
      docker/metadata-action `tags:` config block (branch + PR head_ref + sha).
      Forward into a consumer metadata-action `tags:` input; extend by adding
      more lines around the interpolation in the consumer's `tags:` block.
      ---
      Extend with cluster prefix for "deployment" type tags like so:
      type=sha,prefix=${{ inputs.cluster && format('{0}-', inputs.cluster) || '' }}
      ---
      With this setup you can use the output "version" to cache by per branch,
      with fallback to sha when not available (in docker/build-and-push-action):
      cache-from: type=registry,ref=harbor.bratislava.sk/app:cache-${{ steps.meta.outputs.deploy_version }}
      cache-to: type=registry,ref=harbor.bratislava.sk/app:cache-${{ steps.meta.outputs.deploy_version }},mode=max
    value: |
      type=ref,event=branch
      type=raw,value=${{ github.head_ref }},enable=${{ github.event_name == 'pull_request' }}
      type=sha,prefix=

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        driver-opts: ${{ inputs.buildx_driver_opts }}

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ inputs.docker_registry_username }}
        password: ${{ inputs.docker_registry_password }}

    - name: Log in to Harbor
      uses: docker/login-action@v4
      with:
        registry: ${{ inputs.harbor_registry }}
        username: ${{ inputs.harbor_registry_username }}
        password: ${{ inputs.harbor_registry_password }}
